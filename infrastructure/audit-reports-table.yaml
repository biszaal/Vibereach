AWSTemplateFormatVersion: "2010-09-09"
Description: VibeReach — Audit Reports DynamoDB table

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging, dev]

Resources:
  AuditReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "vibereach-audit-reports-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: projectId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: projectId-index
          KeySchema:
            - AttributeName: projectId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: VibeReach
        - Key: Environment
          Value: !Ref Environment

Outputs:
  TableName:
    Value: !Ref AuditReportsTable
    Export:
      Name: !Sub "vibereach-audit-reports-table-${Environment}"
